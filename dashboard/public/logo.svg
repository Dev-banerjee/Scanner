<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180" width="100%" height="100%">
  <defs>
    <!-- Cyberpunk Gradients -->
    <linearGradient id="cyberGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="50%" stop-color="#9B51E0" />
      <stop offset="100%" stop-color="#FF007A" />
    </linearGradient>
    
    <linearGradient id="laserGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" stop-opacity="0" />
      <stop offset="50%" stop-color="#00F2FE" stop-opacity="1" />
      <stop offset="100%" stop-color="#00F2FE" stop-opacity="0" />
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes glitch {
      0% {
        transform: translate(0);
        text-shadow: -2px 2px 0 #00F2FE, 2px -2px 0 #FF007A;
      }
      20% {
        transform: translate(-2px, 2px);
        text-shadow: 2px -2px 0 #00F2FE, -2px 2px 0 #FF007A;
      }
      40% {
        transform: translate(-2px, -2px);
        text-shadow: -2px -2px 0 #00F2FE, 2px 2px 0 #FF007A;
      }
      60% {
        transform: translate(2px, 2px);
        text-shadow: 2px 2px 0 #00F2FE, -2px -2px 0 #FF007A;
      }
      80% {
        transform: translate(2px, -2px);
        text-shadow: -2px 2px 0 #00F2FE, 2px -2px 0 #FF007A;
      }
      100% {
        transform: translate(0);
        text-shadow: -2px 2px 0 #00F2FE, 2px -2px 0 #FF007A;
      }
    }

    @keyframes scanline-move {
      0% {
        transform: translateY(0);
      }
      100% {
        transform: translateY(145px);
      }
    }

    @keyframes pulse {
      0% { opacity: 0.6; }
      50% { opacity: 1; }
      100% { opacity: 0.6; }
    }

    .brand-text {
      font-family: 'Orbitron', 'Fira Code', 'Share Tech Mono', -apple-system, sans-serif;
      font-weight: 900;
      font-size: 64px;
      letter-spacing: 6px;
      fill: url(#cyberGradient);
      filter: url(#neonGlow);
      animation: glitch 1.5s infinite steps(2);
    }

    .subtitle-text {
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      font-size: 14px;
      letter-spacing: 8px;
      fill: #00F2FE;
      opacity: 0.8;
      animation: pulse 2s infinite ease-in-out;
    }

    .scanner-line {
      animation: scanline-move 3s infinite linear;
    }

    .corner-bracket {
      stroke: #00F2FE;
      stroke-width: 2px;
      fill: none;
      opacity: 0.7;
    }
  </style>

  <!-- Corner Brackets for Cybernetic UI Look -->
  <!-- Top Left -->
  <path class="corner-bracket" d="M 20 40 L 20 20 L 40 20" />
  <!-- Top Right -->
  <path class="corner-bracket" d="M 580 40 L 580 20 L 560 20" />
  <!-- Bottom Left -->
  <path class="corner-bracket" d="M 20 140 L 20 160 L 40 160" />
  <!-- Bottom Right -->
  <path class="corner-bracket" d="M 580 140 L 580 160 L 560 160" />

  <!-- Animated Scanner Grid Background -->
  <g opacity="0.1">
    <line x1="50" y1="20" x2="50" y2="160" stroke="#00F2FE" stroke-width="1" />
    <line x1="100" y1="20" x2="100" y2="160" stroke="#00F2FE" stroke-width="1" />
    <line x1="150" y1="20" x2="150" y2="160" stroke="#00F2FE" stroke-width="1" />
    <line x1="200" y1="20" x2="200" y2="160" stroke="#00F2FE" stroke-width="1" />
    <line x1="250" y1="20" x2="250" y2="160" stroke="#00F2FE" stroke-width="1" />
    <line x1="300" y1="20" x2="300" y2="160" stroke="#00F2FE" stroke-width="1" />
    <line x1="350" y1="20" x2="350" y2="160" stroke="#00F2FE" stroke-width="1" />
    <line x1="400" y1="20" x2="400" y2="160" stroke="#00F2FE" stroke-width="1" />
    <line x1="450" y1="20" x2="450" y2="160" stroke="#00F2FE" stroke-width="1" />
    <line x1="500" y1="20" x2="500" y2="160" stroke="#00F2FE" stroke-width="1" />
    <line x1="550" y1="20" x2="550" y2="160" stroke="#00F2FE" stroke-width="1" />
  </g>

  <!-- Animated Scan Line -->
  <rect class="scanner-line" x="30" y="15" width="540" height="4" fill="url(#laserGradient)" />

  <!-- Main Logo Text -->
  <text class="brand-text" x="50%" y="100" text-anchor="middle">VERSESCAN</text>

  <!-- Subtitle -->
  <text class="subtitle-text" x="50%" y="145" text-anchor="middle">NEXT-GEN VULNERABILITY SCANNER</text>
</svg>
